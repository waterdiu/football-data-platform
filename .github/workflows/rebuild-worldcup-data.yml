name: Rebuild World Cup Data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild World Cup shared data
        run: |
          python3 scripts/publish_all_world_cup_data.py
          python3 scripts/build_automation_readiness_report.py

      - name: Commit generated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git add data/ reports/
          git commit -m "Automated World Cup data rebuild"
          git push
