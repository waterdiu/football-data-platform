name: Rebuild World Cup Data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      collect_runtime:
        description: "Run platform-owned runtime collectors before publishing"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: worldcup-data-publish
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect platform runtime data
        if: ${{ github.event_name == 'schedule' || inputs.collect_runtime == 'true' }}
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          THE_ODDS_API_SOCCER_ENABLED: ${{ secrets.THE_ODDS_API_SOCCER_ENABLED }}
        run: |
          python3 scripts/collect_world_cup_runtime_data.py

      - name: Rebuild World Cup shared data
        run: |
          python3 scripts/publish_all_world_cup_data.py
          python3 scripts/build_automation_readiness_report.py

      - name: Commit generated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git add data/ reports/
          git commit -m "Automated World Cup data rebuild"
          git push
